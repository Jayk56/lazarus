apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fixture-ssh-from-awx
  labels:
    app.kubernetes.io/name: awx-fixture
    app.kubernetes.io/part-of: lazarus-e2e
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: awx-fixture
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: awx
      ports:
        - protocol: TCP
          port: 22
