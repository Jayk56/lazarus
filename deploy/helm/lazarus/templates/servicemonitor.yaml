{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "lazarus.fullname" . }}
  labels:
    {{- include "lazarus.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "lazarus.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: {{ ternary "https" "http" .Values.serviceTLS.enabled }}
      path: /metrics
      scheme: {{ ternary "https" "http" .Values.serviceTLS.enabled }}
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
      {{- if .Values.serviceTLS.enabled }}
      {{- if and .Values.serviceTLS.existingSecret (not .Values.serviceTLS.caConfigMap.name) }}
      {{- fail "serviceTLS.caConfigMap.name is required for ServiceMonitor with a custom TLS Secret" }}
      {{- end }}
      tlsConfig:
        ca:
          configMap:
            name: {{ default (printf "%s-service-ca" (include "lazarus.fullname" .)) .Values.serviceTLS.caConfigMap.name }}
            key: {{ ternary "service-ca.crt" .Values.serviceTLS.caConfigMap.key (empty .Values.serviceTLS.existingSecret) }}
        serverName: {{ printf "%s.%s.svc" (include "lazarus.fullname" .) .Release.Namespace }}
      {{- end }}
{{- end }}
